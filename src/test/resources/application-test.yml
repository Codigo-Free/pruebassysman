spring:
  datasource:
    url: jdbc:h2:mem:ordenes;MODE=Oracle;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      # H2 no soporta PARTITION BY ni el paquete PL/SQL de las migraciones Flyway reales;
      # para los slice tests (@DataJpaTest) se deja que Hibernate genere un esquema
      # equivalente simplificado a partir de las entidades. No valida el SP real
      # (eso lo cubre el test de integración con Testcontainers + Oracle).
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

logging:
  level:
    com.sysman.ordenes: DEBUG
