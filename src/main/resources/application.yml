spring:
  application:
    name: ordenes

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/FREEPDB1}
    username: ${DB_USER:ordenes_app}
    password: ${DB_PASSWORD:OrdenesApp123}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        # Las tablas/columnas de las migraciones Flyway se crean en mayúsculas (convención
        # Oracle para identificadores no citados). La estrategia por defecto de Spring Boot
        # convierte los nombres a minúsculas, lo que rompe la validación de esquema de
        # Hibernate; esta estrategia respeta el nombre exacto indicado en @Table/@Column.
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.sysman.ordenes: ${LOG_LEVEL:INFO}
